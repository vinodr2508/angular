<!-- Milestone1 - Component Architecture (User List Page) -->
<!-- Milestone3 - Async pipe (async pipe auto-subscribes and unsubscribes to users$) -->
<!-- Milestone4 - Signals (searchTerm(), filteredUsers() are signal/computed calls) -->

<div class="min-vh-100 bg-light">

  <!-- Top navbar -->
  <nav class="navbar navbar-dark bg-primary shadow-sm px-4">
    <span class="navbar-brand fw-semibold fs-5">
      <i class="bi bi-people-fill me-2"></i>User Management
    </span>
    <!-- Milestone2 - routerLink (Navigate to create user form) -->
    <a routerLink="/users/create" class="ms-auto btn btn-light btn-sm fw-semibold">
      <i class="bi bi-plus-lg me-1"></i>Add New User
    </a>
  </nav>

  <div class="container py-5">

    <!-- Page header -->
    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-2">
      <div>
        <h3 class="fw-bold mb-1">All Users</h3>
        <!-- Milestone4 - Computed signals (Show count of filtered results) -->
        <p class="text-muted small mb-0">
          Showing <strong>{{ filteredUsers().length }}</strong> user(s)
        </p>
      </div>

      <!-- Milestone4 - Signals (Update search signal on input event) -->
      <div style="min-width:260px;">
        <div class="input-group">
          <span class="input-group-text bg-white border-end-0">
            <i class="bi bi-search text-muted"></i>
          </span>
          <input
            type="text"
            class="form-control border-start-0 ps-0"
            placeholder="Search name or email..."
            [value]="searchTerm()"
            (input)="onSearch($any($event.target).value)"
          />
        </div>
      </div>
    </div>

    <!-- Milestone1 - Structural directives (@if for loading state) -->
    @if (isLoading()) {
      <div class="text-center py-5">
        <div class="spinner-border text-primary mb-3" style="width:3rem;height:3rem;" role="status"></div>
        <p class="text-muted">Loading users...</p>
      </div>
    } @else {

      <!-- Milestone4 - Computed signals (filteredUsers() derived from signal + searchTerm) -->
      <!-- Milestone1 - Structural directives (@for with track) -->
      <div class="row g-4">
        @for (u of filteredUsers(); track u.id) {

          <!-- Milestone1 - Reusable components (app-user-card child component) -->
          <!-- Milestone1 - Property binding (@Input) / Event binding (@Output) -->
          <div class="col-sm-6 col-lg-4">
            <app-user-card
              [user]="u"
              (selected)="navigateToUser($event)">
            </app-user-card>
          </div>

        } @empty {
          <!-- Milestone1 - @for @empty block -->
          <div class="col-12">
            <div class="card border-0 shadow-sm text-center py-5">
              <i class="bi bi-person-x fs-1 text-muted mb-3"></i>
              <p class="text-muted mb-0">No users found matching <strong>"{{ searchTerm() }}"</strong></p>
            </div>
          </div>
        }
      </div>

      <!-- Milestone3 - Async pipe (BehaviorSubject stream count) -->
      <div class="mt-4 text-muted small">
        <i class="bi bi-broadcast me-1"></i>
        BehaviorSubject stream total:
        <ng-container *ngIf="users$ | async as allUsers">
          <strong>{{ allUsers.length }}</strong> user(s)
        </ng-container>
      </div>

    }

  </div>
</div>
